<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電腦使用預約系統</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f3;min-height:100vh;padding:1.5rem}
.container{max-width:960px;margin:0 auto;background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,0.1);padding:1.5rem}
button,input{font-family:inherit}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:10px}
.title-row{display:flex;align-items:center;gap:10px}
.title{font-size:18px;font-weight:500;color:#1a1a1a}
.badge{font-size:12px;background:#f1efe8;color:#5f5e5a;border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:2px 8px}
.btn-export{display:flex;align-items:center;gap:5px;font-size:13px;padding:6px 14px;background:#eaf3de;color:#3b6d11;border:0.5px solid #97c459;border-radius:8px;cursor:pointer}
.btn-export:hover{background:#c0dd97}
.btn-export:disabled{opacity:0.5;cursor:not-allowed}
.nav-row{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.btn-today{font-size:12px;padding:5px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:transparent;color:#5f5e5a;cursor:pointer}
.btn-today:hover{background:#f1efe8}
.btn-nav{font-size:15px;padding:4px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:transparent;color:#1a1a1a;cursor:pointer;line-height:1;user-select:none}
.btn-nav:hover{background:#f1efe8}
.week-label{font-size:13px;font-weight:500;color:#1a1a1a;min-width:152px;text-align:center}
.legend{margin-left:auto;display:flex;gap:12px;font-size:11px;color:#5f5e5a}
.leg{display:flex;align-items:center;gap:4px}
.leg-dot{display:inline-block;width:10px;height:10px;border-radius:2px}
.grid-wrap{overflow-x:auto}
.cal-grid{display:grid;grid-template-columns:52px repeat(7,minmax(0,1fr));border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;overflow:hidden}
.hdr-time{background:#f5f5f3;border-bottom:0.5px solid rgba(0,0,0,0.1);border-right:0.5px solid rgba(0,0,0,0.1);padding:6px;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:13px}
.hdr-day{padding:4px;text-align:center;border-bottom:0.5px solid rgba(0,0,0,0.1)}
.hdr-day.weekend{background:#f5f5f3}
.hdr-day.today{background:#e6f1fb}
.hdr-day .dow{font-size:10px;color:#5f5e5a}
.hdr-day .date{font-size:12px;color:#1a1a1a}
.hdr-day.weekend .dow,.hdr-day.weekend .date{color:#bbb}
.hdr-day.today .dow{color:#185fa5}
.hdr-day.today .date{color:#0c447c;font-weight:500}
.time-cell{background:#f5f5f3;border-right:0.5px solid rgba(0,0,0,0.1);padding:0 4px;display:flex;align-items:center;justify-content:flex-end;min-height:36px;font-size:10px;color:#bbb;white-space:nowrap}
.slot-cell{min-height:36px;padding:2px}
.slot-cell.weekend{background:#f5f5f3;padding:0}
.slot-weekend-fill{height:100%;min-height:36px;display:flex;align-items:center;justify-content:center}
.slot-booked{background:#e6f1fb;border:0.5px solid #85b7eb;border-radius:3px;padding:3px 4px;cursor:pointer;height:100%;box-sizing:border-box}
.slot-booked .bname{font-size:10px;font-weight:500;color:#0c447c;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot-booked .bdept{font-size:9px;color:#185fa5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot-cont{background:#e6f1fb;border-left:2px solid #85b7eb;height:100%;box-sizing:border-box;cursor:pointer;opacity:0.5}
.slot-past{height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#bbb}
.slot-free{width:100%;height:100%;min-height:36px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:background 0.1s,color 0.1s}
.slot-free:hover{background:#f5f5f3;color:#bbb}
.loading-overlay{position:absolute;inset:0;background:rgba(255,255,255,0.75);display:flex;align-items:center;justify-content:center;z-index:10;border-radius:12px;font-size:13px;color:#5f5e5a}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.38);z-index:50;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:1.25rem 1.5rem;width:min(380px,90vw);max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:2px}
.modal-sub{font-size:12px;color:#5f5e5a;margin-bottom:1rem}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:#5f5e5a;margin-bottom:3px}
.field input{width:100%;font-size:13px;padding:6px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:#fff;color:#1a1a1a}
.field input:focus{outline:none;box-shadow:0 0 0 2px #85b7eb}
.field input.err{border-color:#e24b4a}
.errmsg{font-size:11px;color:#a32d2d;margin-top:2px}
.dur-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:5px}
.dur-btn{padding:6px 3px;font-size:11px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:transparent;color:#1a1a1a;cursor:pointer}
.dur-btn.active{background:#e6f1fb;border-color:#85b7eb;color:#0c447c;font-weight:500}
.dur-btn:disabled{opacity:0.3;cursor:not-allowed}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.btn-cancel{padding:7px 14px;font-size:13px;background:transparent;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;color:#5f5e5a;cursor:pointer}
.btn-cancel:hover{background:#f5f5f3}
.btn-confirm{padding:7px 18px;font-size:13px;background:#185fa5;border:none;border-radius:8px;color:#fff;font-weight:500;cursor:pointer}
.btn-confirm:hover{background:#0c447c}
.btn-confirm:disabled{opacity:0.5;cursor:not-allowed}
.btn-del{padding:7px 14px;font-size:13px;background:transparent;border:0.5px solid #e24b4a;border-radius:8px;color:#a32d2d;cursor:pointer}
.btn-del:hover{background:#fcebeb}
.btn-del:disabled{opacity:0.5;cursor:not-allowed}
.detail-row{display:flex;gap:8px;margin-bottom:7px;font-size:13px}
.detail-lab{color:#5f5e5a;width:55px;flex-shrink:0}
.detail-val{color:#1a1a1a;font-weight:500}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:8px;font-size:13px;white-space:nowrap;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200}
.toast.show{opacity:1}
.toast.success{background:#0c447c;color:#fff}
.toast.error{background:#a32d2d;color:#fff}
.conn-status{display:flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:8px}
.conn-status.ok{background:#eaf3de;color:#3b6d11}
.conn-status.fail{background:#fcebeb;color:#a32d2d}
.conn-status.loading{background:#f1efe8;color:#5f5e5a}
</style>
</head>
<body>
<div class="container" style="position:relative">
  <div class="loading-overlay" id="main-loading">
    <i class="ti ti-loader" style="font-size:18px;margin-right:6px"></i>連線資料庫中...
  </div>
  <h1 class="sr-only">電腦使用預約系統</h1>
  <div class="top-bar">
    <div class="title-row">
      <i class="ti ti-device-desktop" style="font-size:18px;color:#1a1a1a"></i>
      <span class="title">電腦使用預約</span>
      <span class="badge" id="total-badge">—</span>
      <span class="conn-status loading" id="conn-status">
        <i class="ti ti-circle" style="font-size:10px"></i> 連線中
      </span>
    </div>
    <button class="btn-export" id="btn-export" onclick="exportExcel()" disabled>
      <i class="ti ti-table-export" style="font-size:14px"></i>匯出 Excel
    </button>
  </div>

  <div class="nav-row">
    <button class="btn-today" onclick="goToday()">本週</button>
    <button class="btn-nav" onclick="changeWeek(-1)" aria-label="上一週">&#9664;</button>
    <span class="week-label" id="week-label"></span>
    <button class="btn-nav" onclick="changeWeek(1)" aria-label="下一週">&#9654;</button>
    <div class="legend">
      <div class="leg"><span class="leg-dot" style="background:#e6f1fb;border:0.5px solid #85b7eb"></span>已預約</div>
      <div class="leg"><span class="leg-dot" style="background:#f5f5f3;border:0.5px solid rgba(0,0,0,0.1)"></span>假日</div>
    </div>
  </div>

  <div class="grid-wrap">
    <div class="cal-grid" id="cal-grid" style="min-width:560px"></div>
  </div>
</div>

<!-- 預約 Modal -->
<div class="modal-bg" id="book-modal">
  <div class="modal">
    <div class="modal-title">新增預約</div>
    <div class="modal-sub" id="book-sub"></div>
    <div style="margin-bottom:12px">
      <div style="font-size:12px;color:#5f5e5a;margin-bottom:5px">預約時長</div>
      <div class="dur-grid" id="dur-grid">
        <button class="dur-btn active" data-v="1" onclick="pickDuration(this)">30 分</button>
        <button class="dur-btn" data-v="2" onclick="pickDuration(this)">1 小時</button>
        <button class="dur-btn" data-v="3" onclick="pickDuration(this)">1.5 小時</button>
        <button class="dur-btn" data-v="4" onclick="pickDuration(this)">2 小時</button>
      </div>
    </div>
    <div class="field">
      <label for="f-name">姓名 <span style="color:#a32d2d">*</span></label>
      <input type="text" id="f-name" placeholder="請輸入姓名">
      <div class="errmsg" id="e-name"></div>
    </div>
    <div class="field">
      <label for="f-dept">單位 <span style="color:#a32d2d">*</span></label>
      <input type="text" id="f-dept" placeholder="請輸入所屬單位">
      <div class="errmsg" id="e-dept"></div>
    </div>
    <div class="field">
      <label for="f-phone">連絡電話 <span style="color:#a32d2d">*</span></label>
      <input type="tel" id="f-phone" placeholder="請輸入聯絡電話">
      <div class="errmsg" id="e-phone"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="book-cancel-btn" onclick="closeBook()">取消</button>
      <button class="btn-confirm" id="book-confirm-btn" onclick="confirmBook()">確認預約</button>
    </div>
  </div>
</div>

<!-- 詳情 Modal -->
<div class="modal-bg" id="detail-modal">
  <div class="modal">
    <div class="modal-title" style="margin-bottom:1rem">預約詳情</div>
    <div id="detail-body"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDetail()">關閉</button>
      <button class="btn-del" id="del-btn" onclick="cancelBook()">取消預約</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
// ── Supabase 設定 ──────────────────────────────────────────
var SUPABASE_URL = "https://lonvqyzpihusqhmqgkcr.supabase.co";
var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvbnZxeXpwaWh1c3FobXFna2NyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTQ5OTQsImV4cCI6MjA5NTU3MDk5NH0.U5cHX1blOrAIx75D0kbxIDsyfbNYivTGwe8Bnl-s6yw";
var TABLE = "bookings";

function apiCall(path, opts) {
  opts = opts || {};
  return fetch(SUPABASE_URL + "/rest/v1/" + path, {
    method: opts.method || "GET",
    headers: Object.assign({
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": opts.prefer || ""
    }, opts.headers || {}),
    body: opts.body || undefined
  });
}

function dbGetWeek(dateList) {
  var inList = dateList.map(function(d){ return '"' + d + '"'; }).join(",");
  return apiCall(TABLE + "?date=in.(" + inList + ")&order=date,slot_start")
    .then(function(res){ if (!res.ok) return res.text().then(function(t){throw new Error(t);}); return res.json(); });
}

function dbInsert(row) {
  return apiCall(TABLE, { method:"POST", prefer:"return=representation", body: JSON.stringify(row) })
    .then(function(res){
      if (!res.ok) return res.json().then(function(e){ throw new Error(e.message||"新增失敗"); });
      return res.json();
    });
}

function dbDelete(id) {
  return apiCall(TABLE + "?id=eq." + id, { method:"DELETE" })
    .then(function(res){ if (!res.ok) return res.text().then(function(t){throw new Error(t);}); });
}

function dbGetAll() {
  return apiCall(TABLE + "?order=date,slot_start")
    .then(function(res){ if (!res.ok) return res.text().then(function(t){throw new Error(t);}); return res.json(); });
}

// ── 常數 ──────────────────────────────────────────────────
var OPEN_H = 8, CLOSE_H = 18, SLOTS = (CLOSE_H - OPEN_H) * 2;
var DAYS_ZH = ["日","一","二","三","四","五","六"];

// ── 狀態 ──────────────────────────────────────────────────
var currentWeekOf = weekStart(new Date());
var bookings = {};
var selSlot = null;
var chosenDuration = 1;
var detailId = null;

// ── 日期工具 ──────────────────────────────────────────────
function weekStart(d) {
  var t = new Date(d); t.setHours(0,0,0,0);
  t.setDate(t.getDate() - t.getDay() + 1); return t;
}
function addDays(d, n) { var t = new Date(d); t.setDate(t.getDate()+n); return t; }
function dayKey(d) { return d.toISOString().slice(0,10); }
function slotTime(i) {
  var m = OPEN_H*60 + i*30, h = Math.floor(m/60), mm = m%60;
  return (h<10?"0":"")+h+":"+(mm===0?"00":"30");
}
function slotLabel(i) { return slotTime(i)+" – "+slotTime(i+1); }
function isWeekend(d) { var day = d.getDay(); return day===0||day===6; }
function getWeekDays() { return Array.from({length:7}, function(_,i){ return addDays(currentWeekOf,i); }); }
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── 建立快取 ──────────────────────────────────────────────
function buildCache(rows) {
  var cache = {};
  rows.forEach(function(row) {
    var dk = row.date;
    if (!cache[dk]) cache[dk] = {};
    for (var j=0; j<row.duration; j++) {
      cache[dk][row.slot_start+j] = Object.assign({}, row, {start: row.slot_start});
    }
  });
  return cache;
}

function loadWeek() {
  var days = getWeekDays().map(dayKey);
  return dbGetWeek(days).then(function(rows){ bookings = buildCache(rows); });
}

// ── 初始化 ────────────────────────────────────────────────
function init() {
  loadWeek().then(function() {
    setConnStatus("ok");
    document.getElementById("btn-export").disabled = false;
    document.getElementById("main-loading").style.display = "none";
    render();
  }).catch(function(e) {
    setConnStatus("fail");
    document.getElementById("main-loading").style.display = "none";
    showToast("⚠ 資料庫連線失敗：" + e.message, "error");
    render();
  });
}

function setConnStatus(state) {
  var el = document.getElementById("conn-status");
  var icons = {ok:"ti-circle-check", fail:"ti-circle-x", loading:"ti-circle"};
  var labels = {ok:"已連線", fail:"連線失敗", loading:"連線中"};
  el.className = "conn-status " + state;
  el.innerHTML = '<i class="ti '+icons[state]+'" style="font-size:10px"></i> '+labels[state];
}

// ── 最大時長 ──────────────────────────────────────────────
function maxDur(dk, si) {
  var bk = bookings[dk] || {};
  var max = 1;
  for (var j=1; j<=3; j++) {
    var next = si+j;
    if (next >= SLOTS || bk[next]) break;
    max = j+1;
  }
  return max;
}

// ── 渲染 ──────────────────────────────────────────────────
function render() {
  var days = getWeekDays();
  var todayKey = dayKey(new Date());
  document.getElementById("week-label").textContent = getWeekLabel();

  var seen = {}, total = 0;
  days.forEach(function(d) {
    if (isWeekend(d)) return;
    var dk = dayKey(d), bk = bookings[dk] || {};
    Object.keys(bk).forEach(function(si) {
      var b = bk[si], key = dk+"-"+b.start;
      if (!seen[key]) { seen[key]=true; total++; }
    });
  });
  document.getElementById("total-badge").textContent = "本週 "+total+" 筆";

  var now = new Date();
  var html = "";

  html += '<div class="hdr-time"><i class="ti ti-clock" style="font-size:13px"></i></div>';
  days.forEach(function(d, di) {
    var weekend = isWeekend(d), isToday = dayKey(d)===todayKey;
    var cls = "hdr-day"+(weekend?" weekend":"")+(isToday?" today":"");
    var br = di<6 ? "border-right:0.5px solid rgba(0,0,0,0.1)" : "";
    html += '<div class="'+cls+'" style="'+br+'"><div class="dow">星期'+DAYS_ZH[d.getDay()]+'</div><div class="date">'+(d.getMonth()+1)+"/"+d.getDate()+'</div></div>';
  });

  for (var si=0; si<SLOTS; si++) {
    var isLastRow = si===SLOTS-1;
    var rb = isLastRow ? "" : "border-bottom:0.5px solid rgba(0,0,0,0.1)";
    html += '<div class="time-cell" style="'+rb+'">'+(si%2===0?slotTime(si):"")+'</div>';

    days.forEach(function(d, di) {
      var dk = dayKey(d), bk = bookings[dk]||{}, b = bk[si];
      var weekend = isWeekend(d), isLastCol = di===6;
      var slotDate = new Date(d);
      var sMin = OPEN_H*60+si*30;
      slotDate.setHours(Math.floor(sMin/60), sMin%60, 0, 0);
      var isPast = !weekend && slotDate < now;
      var borderR = isLastCol ? "" : "border-right:0.5px solid rgba(0,0,0,0.1)";
      var borderB = isLastRow ? "" : "border-bottom:0.5px solid rgba(0,0,0,0.1)";

      if (weekend) {
        html += '<div class="slot-cell weekend" style="'+borderR+';'+borderB+'"><div class="slot-weekend-fill">'+(si===Math.floor(SLOTS/2)?'<span style="font-size:9px;color:#bbb">休息</span>':"")+'</div></div>';
      } else if (b && b.start===si) {
        html += '<div class="slot-cell" style="'+borderR+';'+borderB+';padding:2px" onclick="showDetail(\''+b.id+'\')"><div class="slot-booked"><div class="bname">'+esc(b.name)+'</div><div class="bdept">'+esc(b.dept)+'</div></div></div>';
      } else if (b && b.start!==si) {
        html += '<div class="slot-cell" style="'+borderR+';'+borderB+';padding:0" onclick="showDetail(\''+b.id+'\')"><div class="slot-cont"></div></div>';
      } else if (isPast) {
        html += '<div class="slot-cell" style="'+borderR+';'+borderB+'"><div class="slot-past">—</div></div>';
      } else {
        html += '<div class="slot-cell" style="'+borderR+';'+borderB+';padding:0"><button class="slot-free" onclick="openBook(\''+dk+'\','+si+')" aria-label="預約 '+dk+' '+slotLabel(si)+'"><i class="ti ti-plus" style="font-size:11px"></i></button></div>';
      }
    });
  }
  document.getElementById("cal-grid").innerHTML = html;
}

function getWeekLabel() {
  var days = getWeekDays(), s=days[0], e=days[6];
  return s.getFullYear()+"/"+(s.getMonth()+1)+"/"+s.getDate()+" – "+(e.getMonth()+1)+"/"+e.getDate();
}

// ── 切換週 ────────────────────────────────────────────────
function goToday() { currentWeekOf = weekStart(new Date()); refreshWeek(); }
function changeWeek(n) { currentWeekOf = addDays(currentWeekOf, n*7); refreshWeek(); }

function refreshWeek() {
  document.getElementById("main-loading").style.display = "flex";
  loadWeek().then(function(){
    document.getElementById("main-loading").style.display = "none";
    render();
  }).catch(function(e){
    document.getElementById("main-loading").style.display = "none";
    showToast("載入失敗："+e.message, "error");
  });
}

// ── 預約 Modal ────────────────────────────────────────────
function openBook(dk, si) {
  si = parseInt(si);
  selSlot = {dk:dk, si:si};
  chosenDuration = 1;
  document.getElementById("book-sub").textContent = dk+"　"+slotLabel(si);
  ["f-name","f-dept","f-phone"].forEach(function(id){
    document.getElementById(id).value="";
    document.getElementById(id).classList.remove("err");
  });
  ["e-name","e-dept","e-phone"].forEach(function(id){ document.getElementById(id).textContent=""; });
  var md = maxDur(dk, si);
  document.querySelectorAll(".dur-btn").forEach(function(btn){
    var v = parseInt(btn.dataset.v);
    btn.disabled = v>md;
    btn.classList.toggle("active", v===1);
  });
  setBookLoading(false);
  document.getElementById("book-modal").classList.add("open");
  setTimeout(function(){ document.getElementById("f-name").focus(); }, 50);
}

function closeBook() { document.getElementById("book-modal").classList.remove("open"); selSlot=null; }

function pickDuration(btn) {
  chosenDuration = parseInt(btn.dataset.v);
  document.querySelectorAll(".dur-btn").forEach(function(b){ b.classList.remove("active"); });
  btn.classList.add("active");
}

function setBookLoading(on) {
  document.getElementById("book-confirm-btn").disabled = on;
  document.getElementById("book-cancel-btn").disabled = on;
  document.getElementById("book-confirm-btn").textContent = on ? "儲存中..." : "確認預約";
}

function confirmBook() {
  var name = document.getElementById("f-name").value.trim();
  var dept = document.getElementById("f-dept").value.trim();
  var phone = document.getElementById("f-phone").value.trim();
  var ok = true;
  [["f-name","e-name",name,"請填寫姓名"],
   ["f-dept","e-dept",dept,"請填寫單位"],
   ["f-phone","e-phone",phone,"請填寫連絡電話"]].forEach(function(arr){
    if (!arr[2]) {
      document.getElementById(arr[1]).textContent = arr[3];
      document.getElementById(arr[0]).classList.add("err");
      ok = false;
    } else {
      document.getElementById(arr[1]).textContent = "";
      document.getElementById(arr[0]).classList.remove("err");
    }
  });
  if (!ok) return;
  setBookLoading(true);
  dbInsert({ date:selSlot.dk, slot_start:selSlot.si, duration:chosenDuration, name:name, dept:dept, phone:phone })
    .then(function(){
      return loadWeek();
    }).then(function(){
      closeBook(); render();
      showToast("✓ "+name+" 已預約 "+selSlot.dk+" "+slotTime(selSlot.si)+"–"+slotTime(selSlot.si+chosenDuration));
    }).catch(function(e){
      setBookLoading(false);
      if (e.message && (e.message.indexOf("unique")>=0 || e.message.indexOf("duplicate")>=0)) {
        showToast("⚠ 此時段已被預約，請選擇其他時段", "error");
      } else {
        showToast("⚠ 儲存失敗："+e.message, "error");
      }
    });
}

// ── 詳情 Modal ────────────────────────────────────────────
function showDetail(id) {
  var found = null;
  Object.keys(bookings).forEach(function(dk){
    Object.keys(bookings[dk]).forEach(function(si){
      var b = bookings[dk][si];
      if (b.id===id && b.start===b.slot_start) found=b;
    });
  });
  if (!found) return;
  detailId = id;
  document.getElementById("detail-body").innerHTML = [
    ["姓名", esc(found.name)],
    ["單位", esc(found.dept)],
    ["電話", esc(found.phone)],
    ["日期", found.date],
    ["時間", slotTime(found.slot_start)+"–"+slotTime(found.slot_start+found.duration)],
    ["時長", found.duration*30+" 分鐘"],
    ["預約於", found.booked_at ? new Date(found.booked_at).toLocaleString("zh-TW") : "—"]
  ].map(function(arr){
    return '<div class="detail-row"><div class="detail-lab">'+arr[0]+'</div><div class="detail-val">'+arr[1]+'</div></div>';
  }).join("");
  document.getElementById("del-btn").disabled = false;
  document.getElementById("del-btn").textContent = "取消預約";
  document.getElementById("detail-modal").classList.add("open");
}

function closeDetail() { document.getElementById("detail-modal").classList.remove("open"); detailId=null; }

function cancelBook() {
  if (!detailId) return;
  var btn = document.getElementById("del-btn");
  btn.disabled=true; btn.textContent="處理中...";
  dbDelete(detailId).then(function(){
    return loadWeek();
  }).then(function(){
    closeDetail(); render();
    showToast("預約已取消");
  }).catch(function(e){
    btn.disabled=false; btn.textContent="取消預約";
    showToast("⚠ 取消失敗："+e.message, "error");
  });
}

// ── 匯出 Excel ────────────────────────────────────────────
function exportExcel() {
  var btn = document.getElementById("btn-export");
  btn.disabled=true;
  btn.innerHTML='<i class="ti ti-loader" style="font-size:14px"></i>下載中...';
  dbGetAll().then(function(rows){
    var data=[["日期","星期","時段","姓名","單位","連絡電話","預約時間"]];
    rows.forEach(function(r){
      var d = new Date(r.date);
      data.push([r.date,"星期"+DAYS_ZH[d.getDay()],slotTime(r.slot_start)+"–"+slotTime(r.slot_start+r.duration),r.name,r.dept,r.phone,r.booked_at?new Date(r.booked_at).toLocaleString("zh-TW"):""]);
    });
    var ws = XLSX.utils.aoa_to_sheet(data);
    ws["!cols"] = [10,8,14,10,14,14,20].map(function(w){return{wch:w};});
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "預約記錄");
    XLSX.writeFile(wb, "電腦預約記錄_"+dayKey(new Date())+".xlsx");
  }).catch(function(e){
    showToast("⚠ 匯出失敗："+e.message,"error");
  }).finally(function(){
    btn.disabled=false;
    btn.innerHTML='<i class="ti ti-table-export" style="font-size:14px"></i>匯出 Excel';
  });
}

// ── Toast ─────────────────────────────────────────────────
var toastTimer = null;
function showToast(msg, type) {
  type = type || "success";
  var t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast show "+type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove("show"); }, 3000);
}

// ── 點背景關閉 ────────────────────────────────────────────
document.querySelectorAll(".modal-bg").forEach(function(bg){
  bg.addEventListener("click", function(e){ if(e.target===bg) bg.classList.remove("open"); });
});

// ── 啟動 ──────────────────────────────────────────────────
init();
</script>
</body>
</html>
